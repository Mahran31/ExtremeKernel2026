name: ExtremeKernel Build (Legacy KSU-Next)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to build (Select d2s for Note 10+)"
        required: false
        default: "all"
        type: choice
        options:
        - all
        - d1
        - d1xks
        - d2s
        - d2x
        - d2xks

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_build_all: ${{ github.event.inputs.model == 'all' }}
    steps:
      - name: Set should_build_all output
        run: echo "should_build_all=${{ github.event.inputs.model == 'all' }}" >> $GITHUB_OUTPUT

  build_d2s:
    needs: setup
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.model == 'd2s' || needs.setup.outputs.should_build_all == 'true' }}
    steps:
      - name: 1. Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

      - name: 3. Dynamic Injection (KernelSU-Next LEGACY)
        run: |
          # سحب إصدار Legacy المخصص للأنوية القديمة (4.14) وزرعه برمجياً
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: 4. Build Kernel for d2s (Silent & Auto-Confirm)
        run: |
          yes "" | ./workflows.sh -m d2s -k Y -r N

      - name: 5. Upload Final Kernel Zip
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-d2s-KSU-Legacy
          path: build/out/d2s/zip
